<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: sans-serif;
        }

        table {
            width: 100%;
            max-width: 800px;
            border-collapse: collapse; /* Une as bordas em uma linha única */
        }

        thead tr {
            background-color: #e0e0e0;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border: 1px solid #ccc; /* Adiciona a linha (borda) cinza */
        }

        th:first-child {
            border-top-left-radius: 10px;
        }

        th:last-child {
            border-top-right-radius: 10px;
        }

        th {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Exemplo esperados de saída  (sem CSS) </h1>

    <table>
        <thead>
            <tr>
                <th>Nome do Produto</th>
                <th>Categoria</th>
                <th>Preço (R$)</th>
                <th>Estoque</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Camiseta</td>
                <td>Vestuário</td>
                <td>49,90</td>
                <td>20</td>
            </tr>
            <tr>
                <td>Notebook</td>
                <td>Eletrônicos</td>
                <td>3.500,00</td>
                <td>5</td>
            </tr>
            <tr>
                <td>Café Gourmet</td>
                <td>Alimentos</td>
                <td>29,90</td>
                <td>15</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
